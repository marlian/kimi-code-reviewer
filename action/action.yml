name: 'Kimi Code Reviewer'
description: 'AI-powered code review using Moonshot Kimi with 256K context window'
author: 'kimi-code-reviewer'

branding:
  icon: 'eye'
  color: 'blue'

inputs:
  kimi_api_key:
    description: 'Moonshot AI API key (from platform.moonshot.ai) or Kimi Code API key'
    required: true
  github_token:
    description: 'GitHub token for API access'
    required: false
    default: ${{ github.token }}
  base_url:
    description: 'API base URL (e.g. https://api.kimi.com/coding/v1 or https://api.moonshot.cn/v1)'
    required: false
    default: 'https://api.moonshot.cn/v1'
  protocol:
    description: 'API protocol: openai or anthropic. Auto-detected from base_url when omitted.'
    required: false
    default: ''
  model:
    description: 'Kimi model to use (k2p6 for Kimi Code, kimi-k2.5 for Moonshot)'
    required: false
    default: 'kimi-k2.5'
  thinking:
    description: 'Thinking mode: default, enabled, or disabled. Set enabled for Kimi Code k2p6 deep reviews.'
    required: false
    default: 'default'
  timeout_ms:
    description: 'Kimi API request timeout in milliseconds. Increase for k2p6 thinking reviews on large PRs.'
    required: false
    default: '300000'
  language:
    description: 'Review comment language (en, zh-TW, zh-CN, ja, ko)'
    required: false
    default: 'en'
  fail_on:
    description: 'Fail the check on: critical, warning, never'
    required: false
    default: 'critical'
  config_path:
    description: 'Path to config file (relative to repo root)'
    required: false
    default: '.kimi-review.yml'

outputs:
  review_summary:
    description: 'The review summary text'
  annotations_count:
    description: 'Number of annotations created'
  critical_count:
    description: 'Number of critical issues found'
  tokens_used:
    description: 'Total tokens used'
  cost_estimate:
    description: 'Estimated API cost in USD'

runs:
  using: 'node20'
  main: 'dist/index.js'
